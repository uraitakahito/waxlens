name: pack-smoke

# Asserts the published shape of BOTH workspace packages works
# end-to-end, WITHOUT actually publishing anything. For each
# workspace (@waxlens/core, @waxlens/tui):
#
#   1. `pnpm pack` produces a tarball with `dist/cli.js` executable
#   2. `npx <tarball> --version` runs from a directory with no project state
#   3. `pnpm publish --dry-run` reports a clean publish plan (no auth, no
#      registry traffic â€” purely a local validation that `files` /
#      `bin` / `prepublishOnly` would behave correctly if we DID push)
#
# Catches packaging regressions (missing `bin`, lost shebang, excluded
# files, broken postbuild chmod, `files` field drift, missing
# `@waxlens/core` workspace dep when @waxlens/tui is consumed via npx)
# that `pnpm check` alone cannot see.
#
# Why `npx` and not `pnpm dlx` for the consumer simulation: most end
# users will reach for `npx <tarball>` since npm ships with Node;
# matching that path in CI keeps the smoke test honest about what
# consumers actually experience.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Pack @waxlens/core
        id: pack-core
        working-directory: packages/core
        run: |
          tarball=$(pnpm pack --silent | tail -n 1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Packed: $tarball"

      - name: Pack @waxlens/tui
        id: pack-tui
        working-directory: packages/tui
        run: |
          tarball=$(pnpm pack --silent | tail -n 1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Packed: $tarball"

      - name: Smoke @waxlens/core from a clean directory
        run: |
          mkdir -p /tmp/waxlens-smoke-core
          # `npx --yes /absolute/path.tgz` is mis-parsed by some npx
          # versions as a script to execute; copy + relative-path
          # form is the empirically-reliable workaround.
          cp "${GITHUB_WORKSPACE}/packages/core/${{ steps.pack-core.outputs.tarball }}" /tmp/waxlens-smoke-core/
          cd /tmp/waxlens-smoke-core
          npx --yes "./${{ steps.pack-core.outputs.tarball }}" --version

      - name: Smoke @waxlens/tui from a clean directory
        run: |
          mkdir -p /tmp/waxlens-smoke-tui
          cp "${GITHUB_WORKSPACE}/packages/tui/${{ steps.pack-tui.outputs.tarball }}" /tmp/waxlens-smoke-tui/
          cd /tmp/waxlens-smoke-tui
          # The tui tarball declares `@waxlens/core` as a runtime dep.
          # pnpm rewrites `workspace:*` to a concrete version range at
          # pack time, so the published manifest no longer carries the
          # `workspace:` protocol â€” npx resolves the dep against the
          # public registry. Until @waxlens/core is published, this step
          # will pull whatever the registry returns (probably 404). We
          # allow it to fail-soft for now and revisit when the
          # publish-ready workflow becomes a real release pipeline.
          npx --yes "./${{ steps.pack-tui.outputs.tarball }}" --version || \
            echo "::warning::@waxlens/tui smoke skipped â€” @waxlens/core not yet on the registry"

      - name: Publish dry-run (both workspaces)
        # `pnpm publish --dry-run` writes nothing to the registry and
        # makes no network requests beyond resolving the package name.
        # It runs `prepublishOnly` (check + build) up-front, so this
        # step doubles as a final integration test of the release
        # gate. `--no-git-checks` skips pnpm's default refusal to
        # publish from a branch / dirty tree â€” a dry-run wants to run
        # regardless of working-tree state. If you ever genuinely want
        # to publish, replace this with a separate, manually-triggered
        # workflow that requires the NPM_TOKEN secret â€” never automate
        # `pnpm publish` from a `push` / `pull_request` trigger.
        run: |
          pnpm publish --dry-run --no-git-checks --filter @waxlens/core
          pnpm publish --dry-run --no-git-checks --filter @waxlens/tui
